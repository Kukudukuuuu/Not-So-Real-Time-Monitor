<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuku Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0a0a;
            --terminal-bg: #0d0d0d;
            --primary: #ffffff;
            --secondary: #cccccc;
            --accent: #ffffff;
            --warning: #888888;
            --border: #333333;
            --text-dim: #555555;
        }
        body {
            font-family: 'Fira Code', 'Courier New', monospace;
            background: var(--bg-dark);
            color: var(--primary);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
            pointer-events: none;
            z-index: 1000;
            animation: scanlines 0.1s linear infinite;
        }
        @keyframes scanlines { 0% { transform: translateY(0); } 100% { transform: translateY(4px); } }
        @keyframes flicker { 0%, 100% { opacity: 1; } 92% { opacity: 1; } 93% { opacity: 0.8; } 94% { opacity: 1; } }
        .terminal {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--terminal-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
            animation: flicker 4s infinite;
            box-shadow: 0 0 20px rgba(255,255,255,0.05), inset 0 0 60px rgba(0,0,0,0.5);
        }
        .terminal-header {
            background: linear-gradient(180deg, #1a1a1a, #0d0d0d);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .window-controls { display: flex; gap: 8px; }
        .control { width: 12px; height: 12px; border-radius: 50%; }
        .control.close { background: #666; }
        .control.minimize { background: #888; }
        .control.maximize { background: #aaa; }
        .window-title {
            font-size: 13px;
            color: var(--secondary);
            text-shadow: 0 0 10px var(--primary);
        }
        .terminal-body { padding: 20px; }
        .system-info {
            border: 1px solid var(--primary);
            padding: 15px;
            margin-bottom: 20px;
        }
        .info-row { display: flex; flex-wrap: wrap; gap: 30px; font-size: 13px; }
        .info-item { display: flex; gap: 8px; }
        .info-label { color: var(--secondary); }
        .info-value { color: var(--accent); text-shadow: 0 0 5px var(--primary); }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .metric-panel { border: 1px solid var(--border); padding: 15px; }
        .metric-title { font-size: 12px; color: var(--secondary); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .metric-title::before { content: '>'; color: var(--primary); }
        .bar-container { background: var(--bg-dark); height: 20px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); transition: width 0.5s ease; position: relative; }
        .bar-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .bar-value { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--bg-dark); font-weight: 600; }
        .metric-details { margin-top: 8px; font-size: 11px; color: var(--secondary); display: flex; justify-content: space-between; }
        .network-stats { display: flex; gap: 20px; margin-top: 8px; }
        .network-item { font-size: 11px; }
        .network-up { color: var(--secondary); }
        .network-down { color: var(--warning); }
        .panel-section { border: 1px solid var(--border); margin-bottom: 20px; }
        .section-header { background: var(--bg-dark); padding: 10px 15px; font-size: 12px; color: var(--secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .section-header::before { content: '>'; color: var(--primary); }
        .process-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .process-table th { text-align: left; padding: 10px 15px; color: var(--secondary); border-bottom: 1px solid var(--border); font-weight: 500; }
        .process-table td { padding: 8px 15px; border-bottom: 1px solid var(--border); }
        .process-table tr:hover { background: rgba(255,255,255,0.05); }
        .cpu-high { color: var(--error); }
        .cpu-med { color: var(--warning); }
        .cpu-low { color: var(--primary); }
        .logs-container { max-height: 200px; overflow-y: auto; padding: 10px 15px; font-size: 11px; background: var(--bg-dark); }
        .log-entry { margin-bottom: 4px; display: flex; gap: 10px; }
        .log-time { color: var(--text-dim); }
        .log-type { color: var(--secondary); }
        .status-bar { background: var(--bg-dark); padding: 8px 15px; font-size: 11px; display: flex; justify-content: space-between; border-top: 1px solid var(--border); color: var(--text-dim); }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .cursor { display: inline-block; width: 8px; height: 14px; background: var(--primary); animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 4px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .terminal-body { padding: 10px; }
            .info-row { flex-direction: column; gap: 10px; }
            .metrics-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">
            <div class="window-controls">
                <div class="control close"></div>
                <div class="control minimize"></div>
                <div class="control maximize"></div>
            </div>
            <div class="window-title">root@kuku:~/monitor<span class="cursor"></span></div>
            <div style="width:52px"></div>
        </div>
        <div class="terminal-body">
            <div class="system-info">
                <div class="info-row">
                    <div class="info-item"><span class="info-label">HOSTNAME:</span><span class="info-value" id="platform">loading...</span></div>
                    <div class="info-item"><span class="info-label">CPU:</span><span class="info-value" id="cpuInfo">-</span></div>
                    <div class="info-item"><span class="info-label">MEM:</span><span class="info-value" id="memInfo">-</span></div>
                    <div class="info-item"><span class="info-label">UPTIME:</span><span class="info-value" id="uptime">-</span></div>
                    <div class="info-item"><span class="info-label">CLOCK:</span><span class="info-value" id="currentTime">--:--:--</span></div>
                </div>
            </div>
            <div class="metrics-grid">
                <div class="metric-panel">
                    <div class="metric-title">CPU USAGE</div>
                    <div class="bar-container">
                        <div class="bar-fill" id="cpuBar" style="width:0%"><span class="bar-value" id="cpuValue">0%</span></div>
                    </div>
                    <div class="metric-details"><span id="cpuCores">-</span><span id="cpuTemp">-</span></div>
                </div>
                <div class="metric-panel">
                    <div class="metric-title">MEMORY USAGE</div>
                    <div class="bar-container">
                        <div class="bar-fill" id="memBar" style="width:0%"><span class="bar-value" id="memValue">0%</span></div>
                    </div>
                    <div class="metric-details"><span id="memUsed">-</span><span id="memFree">-</span></div>
                </div>
                <div class="metric-panel">
                    <div class="metric-title">LOAD AVG</div>
                    <div class="bar-container">
                        <div class="bar-fill" id="diskBar" style="width:0%"><span class="bar-value" id="diskValue">0.00</span></div>
                    </div>
                    <div class="metric-details"><span id="diskUsed">1m: 0.00</span><span id="diskAvail">5m: 0.00</span></div>
                </div>
                <div class="metric-panel">
                    <div class="metric-title">NETWORK I/O</div>
                    <div class="bar-container" style="height:16px">
                        <div class="bar-fill" id="netBar" style="width:0%"></div>
                    </div>
                    <div class="network-stats">
                        <div class="network-item network-up">▲ <span id="netUp">0</span> KB/s</div>
                        <div class="network-item network-down">▼ <span id="netDown">0</span> KB/s</div>
                    </div>
                </div>
            </div>
            <div class="panel-section">
                <div class="section-header">TOP PROCESSES</div>
                <table class="process-table">
                    <thead><tr><th>PID</th><th>NAME</th><th>CPU %</th><th>MEM</th></tr></thead>
                    <tbody id="processTable"></tbody>
                </table>
            </div>
            <div class="panel-section">
                <div class="section-header">SYSTEM LOGS</div>
                <div class="logs-container" id="logsContainer"></div>
            </div>
        </div>
        <div class="status-bar">
            <div class="status-item"><span class="status-dot"></span><span>Connected</span></div>
            <div class="status-item">Last update: <span id="lastUpdate">--:--:--</span></div>
            <div class="status-item">Refresh: 2s</div>
        </div>
    </div>
    <script>
        var lastNetwork = {sent: 0, received: 0};
        var systemUptime = 0;
        var useDemo = true;
        var storedProcesses = [];
        var processNames = ['node', 'nginx', 'postgres', 'docker', 'python', 'code', 'git'];
        var logMessages = [
            {type: 'info', msg: 'Metrics collected'},
            {type: 'info', msg: 'System check completed'},
            {type: 'info', msg: 'Memory pool refreshed'},
            {type: 'warn', msg: 'High CPU usage detected'},
            {type: 'info', msg: 'Disk I/O monitored'},
            {type: 'info', msg: 'Network stats updated'},
            {type: 'info', msg: 'Process list refreshed'},
            {type: 'warn', msg: 'Memory pressure warning'},
            {type: 'info', msg: 'System uptime tracked'},
            {type: 'info', msg: 'Health check passed'}
        ];

        async function fetchMetrics() {
            try {
                var res = await fetch('/api/metrics');
                if (!res.ok) throw new Error('API not available');
                var data = await res.json();
                useDemo = false;

                document.getElementById('platform').textContent = data.hostname;
                document.getElementById('cpuInfo').textContent = data.cpuCores + ' Cores';
                document.getElementById('memInfo').textContent = data.totalMemGB + ' GB';

                systemUptime = data.uptime;

                document.getElementById('cpuBar').style.width = Math.min(100, data.cpuUsage) + '%';
                document.getElementById('cpuValue').textContent = data.cpuUsage.toFixed(1) + '%';
                document.getElementById('cpuCores').textContent = data.cpuModel;

                document.getElementById('memBar').style.width = data.memPercent + '%';
                document.getElementById('memValue').textContent = data.memPercent + '%';
                document.getElementById('memUsed').textContent = data.usedMemGB + ' GB / ' + data.totalMemGB + ' GB';
                document.getElementById('memFree').textContent = (data.totalMemGB - data.usedMemGB).toFixed(1) + ' GB free';

                var loadPercent = Math.min(100, (data.loadAvg[0] / data.cpuCores) * 100);
                document.getElementById('diskBar').style.width = loadPercent + '%';
                document.getElementById('diskValue').textContent = data.loadAvg[0].toFixed(2);
                document.getElementById('diskUsed').textContent = '1m: ' + data.loadAvg[0].toFixed(2);
                document.getElementById('diskAvail').textContent = '5m: ' + (data.loadAvg[1] || 0).toFixed(2);

                var netUp = Math.round((data.network?.sent || 0) / 1024);
                var netDown = Math.round((data.network?.received || 0) / 1024);
                document.getElementById('netUp').textContent = netUp;
                document.getElementById('netDown').textContent = netDown;
                document.getElementById('netBar').style.width = Math.min(100, netDown / 10) + '%';

                storedProcesses = data.processes || [];
                updateProcessTable(storedProcesses);
            } catch (e) {
                useDemo = true;
            }
        }

        function updateDemoMetrics() {
            if (!useDemo) return;

            var cpuDemo = 20 + Math.random() * 40;
            var memDemo = 40 + Math.random() * 30;
            var netUpDemo = Math.round(10 + Math.random() * 100);
            var netDownDemo = Math.round(50 + Math.random() * 500);
            var loadDemo = 0.5 + Math.random() * 2;

            document.getElementById('platform').textContent = 'localhost';
            document.getElementById('cpuInfo').textContent = 'Demo Mode';
            document.getElementById('memInfo').textContent = 'Demo';

            document.getElementById('cpuBar').style.width = cpuDemo + '%';
            document.getElementById('cpuValue').textContent = cpuDemo.toFixed(1) + '%';
            document.getElementById('cpuCores').textContent = 'CPU: ' + cpuDemo.toFixed(1) + '%';

            document.getElementById('memBar').style.width = memDemo + '%';
            document.getElementById('memValue').textContent = memDemo.toFixed(0) + '%';
            document.getElementById('memUsed').textContent = 'Memory: ' + memDemo.toFixed(0) + '%';
            document.getElementById('memFree').textContent = 'Demo';

            document.getElementById('netUp').textContent = netUpDemo;
            document.getElementById('netDown').textContent = netDownDemo;
            document.getElementById('netBar').style.width = Math.min(100, (netDownDemo / 1024) * 10) + '%';

            document.getElementById('diskBar').style.width = Math.min(100, loadDemo * 20) + '%';
            document.getElementById('diskValue').textContent = loadDemo.toFixed(2);
            document.getElementById('diskUsed').textContent = '1m: ' + loadDemo.toFixed(2);
            document.getElementById('diskAvail').textContent = 'Demo';

            var demoProcesses = [
                {pid: 1234, name: 'node.exe', mem: 120},
                {pid: 5678, name: 'chrome.exe', mem: 450},
                {pid: 9012, name: 'code.exe', mem: 280},
                {pid: 3456, name: 'explorer.exe', mem: 85},
                {pid: 7890, name: 'powershell.exe', mem: 45}
            ];
            updateProcessTable(demoProcesses);
        }

        function updateTime() {
            var now = new Date();
            var timeStr = now.toLocaleTimeString('en-US', {hour12: false});
            document.getElementById('currentTime').textContent = timeStr;
            document.getElementById('lastUpdate').textContent = timeStr;
        }

        function updateUptime() {
            if (systemUptime > 0) {
                var days = Math.floor(systemUptime / 86400);
                var hours = Math.floor((systemUptime % 86400) / 3600);
                var mins = Math.floor((systemUptime % 3600) / 60);
                document.getElementById('uptime').textContent = days > 0 ? days + 'd ' + hours + 'h ' + mins + 'm' : hours + 'h ' + mins + 'm';
            }
        }

        function getCpuClass(cpu) {
            if (cpu >= 80) return 'cpu-high';
            if (cpu >= 40) return 'cpu-med';
            return 'cpu-low';
        }

        function randomInRange(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function updateProcesses() {
            if (!useDemo && storedProcesses.length > 0) {
                return;
            }
            var processes = [];
            for (var i = 0; i < 5; i++) {
                processes.push({
                    pid: randomInRange(100, 65000),
                    name: processNames[randomInRange(0, processNames.length - 1)],
                    cpu: randomInRange(1, 50),
                    mem: randomInRange(1, 20)
                });
            }
            processes.sort(function(a, b) { return b.cpu - a.cpu; });

            var tbody = document.getElementById('processTable');
            var html = '';
            for (var j = 0; j < processes.length; j++) {
                var p = processes[j];
                html += '<tr><td>' + p.pid + '</td><td>' + p.name + '</td><td class="' + getCpuClass(p.cpu) + '">' + p.cpu + '%</td><td>' + p.mem + '%</td></tr>';
            }
            tbody.innerHTML = html;
        }

        function updateProcessTable(processes) {
            var tbody = document.getElementById('processTable');
            var html = '';
            for (var i = 0; i < Math.min(processes.length, 10); i++) {
                var p = processes[i];
                html += '<tr><td>' + p.pid + '</td><td>' + p.name + '</td><td class="cpu-low">-</td><td>' + p.mem + ' MB</td></tr>';
            }
            tbody.innerHTML = html;
        }

        function updateLogs() {
            var container = document.getElementById('logsContainer');
            var now = new Date();
            var time = now.toLocaleTimeString('en-US', {hour12: false});

            if (Math.random() > 0.6) {
                var log = logMessages[randomInRange(0, logMessages.length - 1)];
                var entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = '<span class="log-time">[' + time + ']</span><span class="log-type ' + log.type + '">[' + log.type.toUpperCase() + ']</span><span class="log-message">' + log.msg + '</span>';
                container.insertBefore(entry, container.firstChild);

                if (container.children.length > 12) {
                    container.removeChild(container.lastChild);
                }
            }
        }

        function init() {
            updateTime();
            fetchMetrics();
            updateProcesses();

            setInterval(updateTime, 1000);
            setInterval(updateUptime, 1000);
            setInterval(fetchMetrics, 2000);
            setInterval(updateDemoMetrics, 2000);
            setInterval(updateProcesses, 3000);
            setInterval(updateLogs, 1000);
        }

        init();
    </script>
</body>
</html>
